  // ==================== ФУНКЦИЯ ДОБАВЛЕНИЯ В КОРЗИНУ ====================
  const CART_KEY = 'dustshine_cart';

  function addToCart(product) {
    let cart = localStorage.getItem(CART_KEY);
    cart = cart ? JSON.parse(cart) : [];
    const existingIndex = cart.findIndex(item => item.id === product.id);
    if (existingIndex !== -1) {
      cart[existingIndex].quantity += product.quantity;
    } else {
      cart.push({
        id: product.id,
        name: product.name,
        price: product.price,
        image: product.image,
        category: product.category,
        quantity: product.quantity
      });
    }
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
  }

  function getProductIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    return id ? parseInt(id) : null;
  }

  function renderProductDetail(productId) {
    const container = document.getElementById('productDetailContainer');
    const product = productsDatabase[productId];
    if (!product) {
      container.innerHTML = `<div class="error-state">Товар не найден. <a href="category.html">Вернуться к категориям</a></div>`;
      return;
    }

    let charsHtml = '';
    for (const [key, value] of Object.entries(product.characteristics)) {
      charsHtml += `<div class="char-row"><span class="char-name">${key}:</span><span class="char-value">${value}</span></div>`;
    }
    const stockStatus = product.stock > 0 
      ? `<span class="in-stock">✓ В наличии: ${product.stock} шт.</span>` 
      : `<span class="out-of-stock">✗ Нет в наличии</span>`;

    const html = `
      <div class="product-card-layout">
        <div class="product-main-row">
          <div class="product-image-col">
            <img src="${product.mainImage}" alt="${product.name}" onerror="this.src='https://placehold.co/600x800/E6D2AE/4A0D17?text=${encodeURIComponent(product.name)}'">
          </div>
          <div class="product-info-col">
            <h1 class="product-title">${product.name}</h1>
            <div class="product-category">${product.category}</div>
            <div class="product-price">${product.price}</div>
            <div class="product-full-description"><h3>Описание</h3><p>${product.fullDescription}</p></div>
            <div class="stock-info">${stockStatus}</div>
            <div class="cart-controls">
              <div class="quantity-selector">
                <button class="qty-btn" id="decrQty">−</button>
                <input type="number" id="qtyInput" value="1" min="1" max="${product.stock}" step="1">
                <button class="qty-btn" id="incrQty">+</button>
              </div>
              <button class="add-to-cart-btn" id="addToCartBtn" ${product.stock === 0 ? 'disabled' : ''}>Добавить в корзину</button>
            </div>
            <div id="cartMessage" class="cart-message"></div>
          </div>
        </div>
        <div class="product-characteristics-bottom"><h3>Характеристики</h3><div class="chars-grid">${charsHtml}</div></div>
      </div>
    `;
    container.innerHTML = html;

    const decrBtn = document.getElementById('decrQty'), incrBtn = document.getElementById('incrQty'), qtyInput = document.getElementById('qtyInput');
    const addBtn = document.getElementById('addToCartBtn'), msgDiv = document.getElementById('cartMessage');
    if (decrBtn && incrBtn && qtyInput) {
      const maxStock = product.stock;
      const updateQty = () => { let val = parseInt(qtyInput.value); if (isNaN(val)) val = 1; val = Math.min(maxStock, Math.max(1, val)); qtyInput.value = val; };
      decrBtn.onclick = () => { let val = parseInt(qtyInput.value); if (val > 1) qtyInput.value = val - 1; updateQty(); };
      incrBtn.onclick = () => { let val = parseInt(qtyInput.value); if (val < maxStock) qtyInput.value = val + 1; updateQty(); };
      qtyInput.onchange = updateQty;
    }
    if (addBtn) {
      addBtn.onclick = () => {
        const quantity = parseInt(qtyInput.value);
        const priceNumber = parseInt(product.price.replace(/\s/g, '').replace('₽', ''));
        addToCart({
          id: product.id,
          name: product.name,
          price: priceNumber,
          image: product.mainImage,
          category: product.category,
          quantity: quantity
        });
        msgDiv.innerHTML = `✅ Товар "${product.name}" в количестве ${quantity} шт. добавлен в корзину!`;
        msgDiv.style.opacity = '1';
        setTimeout(() => msgDiv.style.opacity = '0', 3000);
      };
    }
  }

  function renderSimilarProducts(productId) {
    const product = productsDatabase[productId];
    if (!product || !product.similarIds || product.similarIds.length === 0) {
      document.getElementById('similarGrid').innerHTML = '<div class="no-similar">Нет похожих товаров</div>';
      return;
    }
    const similar = product.similarIds.map(id => productsDatabase[id]).filter(p => p);
    const similarHtml = similar.map(p => `
      <div class="category-card similar-card">
        <div class="card-image-wrapper">
          <img src="${p.mainImage}" alt="${p.name}" class="category-img" onerror="this.src='https://placehold.co/600x800/E6D2AE/4A0D17?text=${encodeURIComponent(p.name)}'">
        </div>
        <div class="card-info">
          <h3 class="card-category">${p.name}</h3>
          <p class="card-desc">${p.fullDescription.substring(0, 80)}…</p>
          <div class="similar-price">${p.price}</div>
          <a href="product-detail.html?id=${p.id}" class="card-link">Подробнее →</a>
        </div>
      </div>
    `).join('');
    document.getElementById('similarGrid').innerHTML = similarHtml;
  }

  // Инициализация и модальное окно
  const productId = getProductIdFromUrl();
  if (productId && productsDatabase[productId]) {
    renderProductDetail(productId);
    renderSimilarProducts(productId);
  } else {
    document.getElementById('productDetailContainer').innerHTML = `<div class="error-state">Товар не выбран или не существует. <a href="category.html">Вернуться к покупкам</a></div>`;
    document.getElementById('similarGrid').innerHTML = '';
  }

  // Модальное окно для увеличения фото
  const modal = document.getElementById('imageModal'), modalImg = document.getElementById('modalImage'), modalCaption = document.getElementById('modalCaption'), closeBtn = document.querySelector('.modal-close');
  document.addEventListener('click', (e) => {
    const wrapper = e.target.closest('.card-image-wrapper') || e.target.closest('.product-image-col');
    if (wrapper) {
      const img = wrapper.querySelector('img');
      if (img && img.src) {
        modal.style.display = 'flex';
        modalImg.src = img.src;
        modalCaption.textContent = img.alt || 'Винтажное изделие';
        e.stopPropagation();
      }
    }
  });
  const closeModal = () => modal.style.display = 'none';
  modal.addEventListener('click', closeModal);
  closeBtn.addEventListener('click', closeModal);
  modalImg.addEventListener('click', (e) => e.stopPropagation());
</script>
